name: Deploy to ap-entreprenly VM

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: project-be50a4ae-ea05-447b-8c4
  GCP_REGION: us-east1
  GCP_ZONE: us-east1-d
  AR_HOST: us-east1-docker.pkg.dev
  IMAGE: us-east1-docker.pkg.dev/project-be50a4ae-ea05-447b-8c4/entreprenly/ap-entreprenly-api
  VM_NAME: ap-entreprenly

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.AR_HOST }} --quiet

      - name: Build and push image
        run: |
          docker build -t "${IMAGE}:${GITHUB_SHA}" -t "${IMAGE}:latest" .
          docker push "${IMAGE}:${GITHUB_SHA}"
          docker push "${IMAGE}:latest"

      - name: Deploy on the VM over SSH (IAP tunnel)
        run: |
          AR_TOKEN="$(gcloud auth print-access-token)"
          gcloud compute ssh "${VM_NAME}" \
            --zone "${GCP_ZONE}" \
            --tunnel-through-iap \
            --quiet \
            --command "echo '${AR_TOKEN}' | sudo docker login -u oauth2accesstoken --password-stdin https://${AR_HOST} && cd /opt/app && sudo API_IMAGE='${IMAGE}:${GITHUB_SHA}' docker compose pull && sudo API_IMAGE='${IMAGE}:${GITHUB_SHA}' docker compose up -d --remove-orphans"
